spring:
  application:
    name: CloudFileStorage
  datasource:
    username:
    password:
    url: jdbc:mariadb://localhost:3306/cloudfilestorage
  jpa:
    defer-datasource-initialization: true
    database-platform: org.hibernate.dialect.MariaDBDialect
    hibernate:
      ddl-auto: create
  sql:
    init:
      mode: always
  main:
    lazy-initialization: false
  data:
    redis:
      host: localhost
      port: 6379